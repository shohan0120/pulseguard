<?xml version="1.0" encoding="UTF-8"?>
<!-- PulseGuard app icon — reusable full-color source (e.g. Play Store 512px listing icon).
     White lightning bolt on a #3B82F6 → #1D4ED8 vertical blue gradient rounded square. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="pulseGradient" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#pulseGradient)"/>
  <path d="M181,106 L181,271 L226,271 L226,406 L331,226 L271,226 L331,106 Z" fill="#FFFFFF"/>
</svg>
